<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>班級經濟與投資系統</title>
  <!-- 引入 Tailwind CSS 美化介面 -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800 pb-20">

  <div class="max-w-md mx-auto p-4">
    <!-- 頁頭 -->
    <header class="text-center my-4">
      <h1 class="text-2xl font-extrabold text-indigo-600">🏫 班級經濟系統</h1>
      <p class="text-xs text-slate-500">學習．賺薪．排行榜．理財投資</p>
    </header>

    <!-- 1. 登入區塊 -->
    <div id="login-card" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
      <h2 class="text-lg font-bold mb-4 text-slate-700">學生 / 老師登入</h2>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">電子郵件 (Email)</label>
          <input type="email" id="login-email" required placeholder="student@school.com" class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">密碼</label>
          <input type="password" id="login-password" required placeholder="••••••••" class="w-full px-4 py-2 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg text-sm transition">登入系統</button>
      </form>
      <p id="login-error" class="text-xs text-red-500 mt-3 text-center hidden"></p>
    </div>

    <!-- 2. 主面板 (登入後顯示) -->
    <div id="main-dashboard" class="space-y-4 hidden">
      
      <!-- 頂部用戶資訊資訊欄 -->
      <div class="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm border border-slate-200">
        <div>
          <p id="user-email-display" class="text-xs font-bold text-slate-600">載入中...</p>
          <p id="user-role-badge" class="text-[10px] inline-block bg-slate-100 text-slate-600 px-2 py-0.5 rounded mt-0.5">學生</p>
        </div>
        <button id="btn-logout" class="text-xs text-red-500 hover:underline">登出</button>
      </div>

      <!-- 👑 老師專屬管理面板 (非管理員自動隱藏) -->
      <div id="admin-panel" class="bg-amber-50 border border-amber-200 p-4 rounded-xl hidden space-y-2">
        <h3 class="font-bold text-amber-800 text-xs">👑 老師手動調整薪金</h3>
        <input type="email" id="admin-target-email" placeholder="學生 Email" class="w-full px-3 py-1.5 border border-amber-300 rounded text-xs bg-white">
        <input type="number" id="admin-amount" placeholder="金額 (+100 或 -50)" class="w-full px-3 py-1.5 border border-amber-300 rounded text-xs bg-white">
        <input type="text" id="admin-reason" placeholder="原因 (如: 作業優良)" class="w-full px-3 py-1.5 border border-amber-300 rounded text-xs bg-white">
        <button id="btn-admin-adjust" class="w-full bg-amber-600 text-white font-bold py-1.5 rounded text-xs">發放 / 扣除</button>
      </div>

      <!-- ================= 頁面 1：答題賺薪 ================= -->
      <div id="tab-questions" class="tab-content space-y-4">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
          <h3 class="font-bold text-indigo-600 mb-2 flex items-center gap-1">🎯 每日答題挑戰</h3>
          <p class="text-sm text-slate-600 mb-3">題目：<strong>台灣最高峰是哪一座山？</strong> <br><span class="text-xs text-amber-600 font-bold">(答對獎金 +$20)</span></p>
          <div class="flex gap-2">
            <input type="text" id="answer-input" placeholder="請輸入答案..." class="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
            <button id="btn-submit-answer" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold px-4 py-2 rounded-lg transition">提交</button>
          </div>
          <p id="answer-feedback" class="text-xs mt-2 hidden"></p>
        </div>
      </div>

      <!-- ================= 頁面 2：排行榜 ================= -->
      <div id="tab-leaderboard" class="tab-content space-y-4 hidden">
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
          <h3 class="font-bold text-slate-700 mb-3 flex items-center gap-1 text-base">🏆 全班薪金排行榜</h3>
          <div id="leaderboard-list" class="space-y-2 text-xs">
            <p class="text-slate-400 text-center py-4">載入排行榜中...</p>
          </div>
        </div>
      </div>

      <!-- ================= 頁面 3：我的薪金與紀錄 ================= -->
      <div id="tab-wallet" class="tab-content space-y-4 hidden">
        <!-- 薪金總額卡片 -->
        <div class="bg-gradient-to-br from-indigo-500 to-purple-600 text-white p-5 rounded-2xl shadow-md text-center">
          <p class="text-xs opacity-80">可支配薪金餘額</p>
          <h2 class="text-3xl font-extrabold mt-1">$ <span id="salary-amount">0</span></h2>
        </div>

        <!-- 歷史紀錄 -->
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
          <h3 class="font-bold text-slate-700 mb-3 text-sm">📜 最近出糧與變動記錄</h3>
          <ul id="ledger-list" class="space-y-2 text-xs text-slate-600">
            <li class="text-slate-400 text-center py-2">尚無交易記錄</li>
          </ul>
        </div>
      </div>

      <!-- ================= 頁面 4：投資中心 ================= -->
      <div id="tab-investment" class="tab-content space-y-4 hidden">
        <div class="bg-gradient-to-br from-emerald-500 to-teal-700 text-white p-5 rounded-2xl shadow-md text-center">
          <p class="text-xs opacity-80">投資帳戶總額 (定期利息 5%)</p>
          <h2 class="text-3xl font-extrabold mt-1">$ <span id="investment-amount">0</span></h2>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 space-y-3">
          <h3 class="font-bold text-emerald-700 text-sm">📈 薪金轉投資儲蓄</h3>
          <p class="text-xs text-slate-500">你可以將可支配薪金存入投資帳戶賺取利息，也可以隨時提領回薪金帳戶。</p>
          
          <input type="number" id="invest-input-amount" placeholder="輸入金額" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none">
          
          <div class="grid grid-cols-2 gap-2">
            <button id="btn-invest-deposit" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 rounded-lg text-xs transition">轉入投資 (+)</button>
            <button id="btn-invest-withdraw" class="bg-slate-600 hover:bg-slate-700 text-white font-bold py-2 rounded-lg text-xs transition">提領至薪金 (-)</button>
          </div>
          <p id="invest-feedback" class="text-xs mt-1 hidden"></p>
        </div>
      </div>

    </div>
  </div>

  <!-- 📱 底部 4 按鈕導覽列 (登入後顯示) -->
  <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 max-w-md mx-auto flex justify-around py-2 z-50 hidden">
    <button onclick="switchTab('tab-questions', this)" class="nav-btn flex flex-col items-center text-indigo-600 font-bold text-[11px]">
      <span class="text-base">🎯</span>
      <span>答題賺薪</span>
    </button>
    <button onclick="switchTab('tab-leaderboard', this)" class="nav-btn flex flex-col items-center text-slate-400 text-[11px]">
      <span class="text-base">🏆</span>
      <span>排行榜</span>
    </button>
    <button onclick="switchTab('tab-wallet', this)" class="nav-btn flex flex-col items-center text-slate-400 text-[11px]">
      <span class="text-base">💰</span>
      <span>我的薪金</span>
    </button>
    <button onclick="switchTab('tab-investment', this)" class="nav-btn flex flex-col items-center text-slate-400 text-[11px]">
      <span class="text-base">📈</span>
      <span>投資中心</span>
    </button>
  </nav>

  <!-- Firebase JavaScript SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, addDoc, onSnapshot, query, where, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔴 請填入你自己的 Firebase 金鑰 🔴
    const firebaseConfig = {
 apiKey: "AIzaSyB_52cUQddAQ89UsBtA1apVIP-A5rGJKbM",
  authDomain: "bafs-6e35d.firebaseapp.com",
  projectId: "bafs-6e35d",
  storageBucket: "bafs-6e35d.firebasestorage.app",
  messagingSenderId: "282979871612",
  appId: "1:282979871612:web:a0d3edb65d3a12f8c3d2f9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // DOM 元素
    const loginCard = document.getElementById('login-card');
    const mainDashboard = document.getElementById('main-dashboard');
    const bottomNav = document.getElementById('bottom-nav');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const userEmailDisplay = document.getElementById('user-email-display');
    const userRoleBadge = document.getElementById('user-role-badge');
    const salaryAmount = document.getElementById('salary-amount');
    const investmentAmount = document.getElementById('investment-amount');
    const btnLogout = document.getElementById('btn-logout');
    const ledgerList = document.getElementById('ledger-list');

    let currentUser = null;
    let currentUserData = {};
    let unsubscribeUserDoc = null;
    let unsubscribeLedger = null;

    // 分頁切換全域函式
    window.switchTab = function(tabId, btnElement) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById(tabId).classList.remove('hidden');

      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.classList.remove('text-indigo-600', 'font-bold');
        btn.classList.add('text-slate-400');
      });
      btnElement.classList.remove('text-slate-400');
      btnElement.classList.add('text-indigo-600', 'font-bold');

      if (tabId === 'tab-leaderboard') loadLeaderboard();
    }

    // 登入處理
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.classList.add('hidden');
      try {
        await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
      } catch (err) {
        loginError.textContent = "登入失敗：請檢查帳號密碼";
        loginError.classList.remove('hidden');
      }
    });

    btnLogout.addEventListener('click', () => signOut(auth));

    // 監聽登入狀態
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        loginCard.classList.add('hidden');
        mainDashboard.classList.remove('hidden');
        bottomNav.classList.remove('hidden');
        userEmailDisplay.textContent = user.email;

        setupUserRealtime(user);
        loadLedger(user.email);
      } else {
        currentUser = null;
        if (unsubscribeUserDoc) unsubscribeUserDoc();
        if (unsubscribeLedger) unsubscribeLedger();
        loginCard.classList.remove('hidden');
        mainDashboard.classList.add('hidden');
        bottomNav.classList.add('hidden');
      }
    });

    // 即時監聽個人資料 (含投資帳戶)
    async function setupUserRealtime(user) {
      const userRef = doc(db, 'users', user.uid);
      const userSnap = await getDoc(userRef);

      if (!userSnap.exists()) {
        await setDoc(userRef, {
          email: user.email,
          current_salary: 0,
          investment_balance: 0,
          is_admin: false
        });
      }

      unsubscribeUserDoc = onSnapshot(userRef, (docSnap) => {
        if (docSnap.exists()) {
          currentUserData = docSnap.data();
          salaryAmount.textContent = currentUserData.current_salary || 0;
          investmentAmount.textContent = currentUserData.investment_balance || 0;

          if (currentUserData.is_admin) {
            userRoleBadge.textContent = "老師/管理員";
            userRoleBadge.className = "text-[10px] inline-block bg-amber-100 text-amber-800 px-2 py-0.5 rounded font-bold";
            document.getElementById('admin-panel').classList.remove('hidden');
          } else {
            userRoleBadge.textContent = "學生";
            userRoleBadge.className = "text-[10px] inline-block bg-slate-100 text-slate-600 px-2 py-0.5 rounded";
            document.getElementById('admin-panel').classList.add('hidden');
          }
        }
      });
    }

    // 載入排行榜 (依 current_salary 降序)
    async function loadLeaderboard() {
      const leaderboardList = document.getElementById('leaderboard-list');
      leaderboardList.innerHTML = '<p class="text-slate-400 text-center py-2">載入中...</p>';

      try {
        const q = query(collection(db, 'users'), orderBy('current_salary', 'desc'), limit(10));
        const querySnapshot = await getDocs(q);

        leaderboardList.innerHTML = '';
        let rank = 1;
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          let medal = `第 ${rank} 名`;
          if (rank === 1) medal = '🥇 冠軍';
          if (rank === 2) medal = '🥈 亞軍';
          if (rank === 3) medal = '🥉 季軍';

          const item = document.createElement('div');
          item.className = "flex justify-between items-center p-2.5 bg-slate-50 rounded-lg border border-slate-100";
          item.innerHTML = `
            <div class="flex items-center gap-2">
              <span class="font-bold text-slate-500 w-12">${medal}</span>
              <span class="font-semibold text-slate-700">${data.email.split('@')[0]}</span>
            </div>
            <span class="font-extrabold text-indigo-600">$${data.current_salary || 0}</span>
          `;
          leaderboardList.appendChild(item);
          rank++;
        });
      } catch (err) {
        leaderboardList.innerHTML = '<p class="text-red-400 text-center py-2">載入排行榜失敗</p>';
      }
    }

    // 載入個人交易記錄
    function loadLedger(email) {
      const q = query(collection(db, 'ledger'), where('student_email', '==', email));
      unsubscribeLedger = onSnapshot(q, (snapshot) => {
        ledgerList.innerHTML = '';
        if (snapshot.empty) {
          ledgerList.innerHTML = '<li class="text-slate-400 text-center py-2">尚無紀錄</li>';
          return;
        }
        snapshot.forEach(doc => {
          const item = doc.data();
          const li = document.createElement('li');
          const isPositive = item.amount >= 0;
          li.className = "flex justify-between items-center p-2 bg-slate-50 rounded border border-slate-100";
          li.innerHTML = `
            <span>${item.reason || '薪金變動'}</span>
            <span class="font-bold ${isPositive ? 'text-green-600' : 'text-red-500'}">
              ${isPositive ? '+' : ''}${item.amount}
            </span>
          `;
          ledgerList.appendChild(li);
        });
      });
    }

    // 答題邏輯
    document.getElementById('btn-submit-answer').addEventListener('click', async () => {
      const input = document.getElementById('answer-input').value.trim();
      const feedback = document.getElementById('answer-feedback');
      feedback.classList.remove('hidden');

      if (input === "玉山") {
        feedback.className = "text-xs mt-2 text-green-600 font-bold";
        feedback.textContent = "🎉 答對了！已發放獎金 $20！";
        
        const userRef = doc(db, 'users', currentUser.uid);
        await updateDoc(userRef, { current_salary: increment(20) });
        await addDoc(collection(db, 'ledger'), {
          student_email: currentUser.email,
          amount: 20,
          reason: "答對問題：台灣最高峰",
          created_at: new Date()
        });
      } else {
        feedback.className = "text-xs mt-2 text-red-500";
        feedback.textContent = "❌ 答案不正確，再試一次！";
      }
    });

    // 投資中心：轉入存款 (Deposit)
    document.getElementById('btn-invest-deposit').addEventListener('click', async () => {
      const amount = parseInt(document.getElementById('invest-input-amount').value);
      const feedback = document.getElementById('invest-feedback');
      feedback.classList.remove('hidden');

      if (isNaN(amount) || amount <= 0) {
        feedback.className = "text-xs text-red-500";
        feedback.textContent = "請輸入有效的轉入金額！";
        return;
      }

      if ((currentUserData.current_salary || 0) < amount) {
        feedback.className = "text-xs text-red-500";
        feedback.textContent = "薪金餘額不足，無法轉入！";
        return;
      }

      const userRef = doc(db, 'users', currentUser.uid);
      await updateDoc(userRef, {
        current_salary: increment(-amount),
        investment_balance: increment(amount)
      });
      await addDoc(collection(db, 'ledger'), {
        student_email: currentUser.email,
        amount: -amount,
        reason: "轉入投資帳戶",
        created_at: new Date()
      });

      feedback.className = "text-xs text-green-600 font-bold";
      feedback.textContent = `成功轉入 $${amount} 至投資帳戶！`;
      document.getElementById('invest-input-amount').value = '';
    });

    // 投資中心：提領存款 (Withdraw)
    document.getElementById('btn-invest-withdraw').addEventListener('click', async () => {
      const amount = parseInt(document.getElementById('invest-input-amount').value);
      const feedback = document.getElementById('invest-feedback');
      feedback.classList.remove('hidden');

      if (isNaN(amount) || amount <= 0) {
        feedback.className = "text-xs text-red-500";
        feedback.textContent = "請輸入有效的提領金額！";
        return;
      }

      if ((currentUserData.investment_balance || 0) < amount) {
        feedback.className = "text-xs text-red-500";
        feedback.textContent = "投資帳戶餘額不足！";
        return;
      }

      const userRef = doc(db, 'users', currentUser.uid);
      await updateDoc(userRef, {
        current_salary: increment(amount),
        investment_balance: increment(-amount)
      });
      await addDoc(collection(db, 'ledger'), {
        student_email: currentUser.email,
        amount: amount,
        reason: "從投資帳戶提領",
        created_at: new Date()
      });

      feedback.className = "text-xs text-green-600 font-bold";
      feedback.textContent = `成功提領 $${amount} 回薪金帳戶！`;
      document.getElementById('invest-input-amount').value = '';
    });

    // 老師手動調整薪金
    document.getElementById('btn-admin-adjust').addEventListener('click', async () => {
      const targetEmail = document.getElementById('admin-target-email').value.trim();
      const amount = parseInt(document.getElementById('admin-amount').value);
      const reason = document.getElementById('admin-reason').value.trim();

      if (!targetEmail || isNaN(amount) || !reason) {
        alert("請完整填寫學生 Email、金額與原因！");
        return;
      }

      try {
        const q = query(collection(db, 'users'), where('email', '==', targetEmail));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          alert("找不到該 Email 的學生！");
          return;
        }

        querySnapshot.forEach(async (studentDoc) => {
          await updateDoc(doc(db, 'users', studentDoc.id), { current_salary: increment(amount) });
          await addDoc(collection(db, 'ledger'), {
            student_email: targetEmail,
            amount: amount,
            reason: `[老師發放] ${reason}`,
            created_at: new Date()
          });
        });

        alert("調整成功！");
        document.getElementById('admin-amount').value = '';
        document.getElementById('admin-reason').value = '';
      } catch (err) {
        alert("執行失敗：" + err.message);
      }
    });
  </script>
</body>
</html>
