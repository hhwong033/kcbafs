<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>基智企財</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-800">

  <div class="max-w-md mx-auto p-4 sm:p-6">
    <header class="text-center my-6">
      <h1 class="text-3xl font-extrabold text-indigo-600">🏫 班級經濟系統</h1>
      <p class="text-sm text-slate-500 mt-1">自主管理．答題獎勵．即時出糧</p>
    </header>

    <div id="login-card" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
      <h2 class="text-xl font-bold mb-4 text-slate-700">學生/老師登入</h2>
      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">電子郵件 (Email)</label>
          <input type="email" id="login-email" required placeholder="student@school.com" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 mb-1">密碼</label>
          <input type="password" id="login-password" required placeholder="••••••••" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg transition">登入系統</button>
      </form>
      <p id="login-error" class="text-xs text-red-500 mt-3 text-center hidden"></p>
    </div>

    <div id="main-dashboard" class="space-y-4 hidden">
      <div class="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
        <div>
          <p id="user-email-display" class="text-xs font-bold text-slate-400">載入中...</p>
          <p id="user-role-badge" class="text-xs inline-block bg-slate-100 text-slate-600 px-2 py-0.5 rounded mt-1">學生</p>
        </div>
        <button id="btn-logout" class="text-xs text-red-500 hover:underline">登出</button>
      </div>

      <div class="bg-gradient-to-br from-indigo-500 to-purple-600 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-xs font-medium opacity-80">目前薪金總額</p>
        <h2 class="text-4xl font-extrabold mt-1">$ <span id="salary-amount">0</span></h2>
      </div>

      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
        <h3 class="font-bold text-indigo-600 mb-2 flex items-center gap-1">🎯 每日答題挑戰</h3>
        <p class="text-sm text-slate-600 mb-3">題目：<strong>台灣最高峰是哪一座山？</strong> (答對獎金 +$20)</p>
        <div class="flex gap-2">
          <input type="text" id="answer-input" placeholder="請輸入答案..." class="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
          <button id="btn-submit-answer" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold px-4 py-2 rounded-lg transition">提交</button>
        </div>
        <p id="answer-feedback" class="text-xs mt-2 hidden"></p>
      </div>

      <div id="admin-panel" class="bg-amber-50 border border-amber-200 p-5 rounded-2xl hidden">
        <h3 class="font-bold text-amber-800 mb-3 flex items-center gap-1">👑 老師手動發薪/扣薪</h3>
        <div class="space-y-3">
          <input type="email" id="admin-target-email" placeholder="學生 Email" class="w-full px-3 py-2 border border-amber-300 rounded-lg text-sm outline-none bg-white">
          <input type="number" id="admin-amount" placeholder="金額 (加薪填 50，扣薪填 -20)" class="w-full px-3 py-2 border border-amber-300 rounded-lg text-sm outline-none bg-white">
          <input type="text" id="admin-reason" placeholder="原因 (例：打掃認真)" class="w-full px-3 py-2 border border-amber-300 rounded-lg text-sm outline-none bg-white">
          <button id="btn-admin-adjust" class="w-full bg-amber-600 hover:bg-amber-700 text-white font-bold py-2 rounded-lg text-sm transition">執行發薪/扣薪</button>
        </div>
      </div>

      <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
        <h3 class="font-bold text-slate-700 mb-3 text-sm">📜 最近出糧與變動記錄</h3>
        <ul id="ledger-list" class="space-y-2 text-xs text-slate-600">
          <li class="text-slate-400 text-center py-2">尚無交易記錄</li>
        </ul>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, updateDoc, increment, collection, addDoc, onSnapshot, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔴 🔴 🔴 請將你在第一步複製的 firebaseConfig 通關密碼替換掉以下內容 🔴 🔴 🔴
    const firebaseConfig = {
 apiKey: "AIzaSyB_52cUQddAQ89UsBtA1apVIP-A5rGJKbM",
  authDomain: "bafs-6e35d.firebaseapp.com",
  projectId: "bafs-6e35d",
  storageBucket: "bafs-6e35d.firebasestorage.app",
  messagingSenderId: "282979871612",
  appId: "1:282979871612:web:a0d3edb65d3a12f8c3d2f9"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 取得 UI DOM 元素
    const loginCard = document.getElementById('login-card');
    const mainDashboard = document.getElementById('main-dashboard');
    const loginForm = document.getElementById('login-form');
    const loginError = document.getElementById('login-error');
    const userEmailDisplay = document.getElementById('user-email-display');
    const userRoleBadge = document.getElementById('user-role-badge');
    const salaryAmount = document.getElementById('salary-amount');
    const btnLogout = document.getElementById('btn-logout');
    const ledgerList = document.getElementById('ledger-list');

    let currentUser = null;
    let unsubscribeUserDoc = null;
    let unsubscribeLedger = null;

    // 登入事件處理
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      loginError.classList.add('hidden');
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        loginError.textContent = "登入失敗：請確認帳號密碼是否正確";
        loginError.classList.remove('hidden');
      }
    });

    // 登出事件處理
    btnLogout.addEventListener('click', () => signOut(auth));

    // 監聽登入狀態改變
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        loginCard.classList.add('hidden');
        mainDashboard.classList.remove('hidden');
        userEmailDisplay.textContent = user.email;

        // 初始化或監聽使用者 Firestore 資料
        setupUserRealtime(user);
        loadLedger(user.email);
      } else {
        currentUser = null;
        if (unsubscribeUserDoc) unsubscribeUserDoc();
        if (unsubscribeLedger) unsubscribeLedger();
        loginCard.classList.remove('hidden');
        mainDashboard.classList.add('hidden');
      }
    });

    // 即時監聽學生資料與餘額
    async function setupUserRealtime(user) {
      const userRef = doc(db, 'users', user.uid);
      const userSnap = await getDoc(userRef);

      // 如果這是該學生第一次登入，自動為他在 Firestore 建立資料
      if (!userSnap.exists()) {
        await setDoc(userRef, {
          email: user.email,
          current_salary: 0,
          is_admin: false
        });
      }

      unsubscribeUserDoc = onSnapshot(userRef, (docSnap) => {
        if (docSnap.exists()) {
          const data = docSnap.data();
          salaryAmount.textContent = data.current_salary || 0;
          if (data.is_admin) {
            userRoleBadge.textContent = "老師/管理員";
            userRoleBadge.className = "text-xs inline-block bg-amber-100 text-amber-800 px-2 py-0.5 rounded mt-1 font-bold";
            document.getElementById('admin-panel').classList.remove('hidden');
          } else {
            userRoleBadge.textContent = "學生";
            userRoleBadge.className = "text-xs inline-block bg-slate-100 text-slate-600 px-2 py-0.5 rounded mt-1";
            document.getElementById('admin-panel').classList.add('hidden');
          }
        }
      });
    }

    // 載入歷史變動記錄
    function loadLedger(email) {
      const q = query(collection(db, 'ledger'), where('student_email', '==', email));
      unsubscribeLedger = onSnapshot(q, (snapshot) => {
        ledgerList.innerHTML = '';
        if (snapshot.empty) {
          ledgerList.innerHTML = '<li class="text-slate-400 text-center py-2">尚無紀錄</li>';
          return;
        }
        snapshot.forEach(doc => {
          const item = doc.data();
          const li = document.createElement('li');
          const isPositive = item.amount >= 0;
          li.className = "flex justify-between items-center p-2 bg-slate-50 rounded border border-slate-100";
          li.innerHTML = `
            <span>${item.reason || '薪金變動'}</span>
            <span class="font-bold ${isPositive ? 'text-green-600' : 'text-red-500'}">
              ${isPositive ? '+' : ''}${item.amount}
            </span>
          `;
          ledgerList.appendChild(li);
        });
      });
    }

    // 學生提交答題邏輯
    document.getElementById('btn-submit-answer').addEventListener('click', async () => {
      const input = document.getElementById('answer-input').value.trim();
      const feedback = document.getElementById('answer-feedback');
      feedback.classList.remove('hidden');

      if (input === "玉山") {
        feedback.className = "text-xs mt-2 text-green-600 font-bold";
        feedback.textContent = "🎉 答對了！已幫你加薪 $20！";
        
        // 更新 Firestore 薪金與新增記錄
        const userRef = doc(db, 'users', currentUser.uid);
        await updateDoc(userRef, { current_salary: increment(20) });
        await addDoc(collection(db, 'ledger'), {
          student_email: currentUser.email,
          amount: 20,
          reason: "答對問題：台灣最高峰",
          created_at: new Date()
        });
      } else {
        feedback.className = "text-xs mt-2 text-red-500";
        feedback.textContent = "❌ 答案不正確，再試一次吧！";
      }
    });

    // 老師手動加薪/扣薪邏輯
    document.getElementById('btn-admin-adjust').addEventListener('click', async () => {
      const targetEmail = document.getElementById('admin-target-email').value.trim();
      const amount = parseInt(document.getElementById('admin-amount').value);
      const reason = document.getElementById('admin-reason').value.trim();

      if (!targetEmail || isNaN(amount) || !reason) {
        alert("請完整填寫學生 Email、金額與原因！");
        return;
      }

      try {
        // 尋找該 Email 的學生
        const q = query(collection(db, 'users'), where('email', '==', targetEmail));
        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          alert("找不到該 Email 的學生資料！");
          return;
        }

        querySnapshot.forEach(async (studentDoc) => {
          await updateDoc(doc(db, 'users', studentDoc.id), { current_salary: increment(amount) });
          await addDoc(collection(db, 'ledger'), {
            student_email: targetEmail,
            amount: amount,
            reason: `[老師發放] ${reason}`,
            created_at: new Date()
          });
        });

        alert("發薪/扣薪執行成功！");
        document.getElementById('admin-amount').value = '';
        document.getElementById('admin-reason').value = '';
      } catch (err) {
        alert("執行失敗：" + err.message);
      }
    });
  </script>
</body>
</html>
